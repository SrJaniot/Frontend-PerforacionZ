<div
  *ngIf="showModal"
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-3 sm:p-4"
  (click)="cerrar.emit()"
>
  <div
    class="card w-full max-w-2xl max-h-[90vh] overflow-y-auto p-6 animate-slide-up shadow-2xl"
    (click)="$event.stopPropagation()"
  >
    <div class="flex items-center justify-between mb-6">
      <h3 class="text-xl font-bold text-white font-display">Actualizar Proyecto</h3>
      <button
        type="button"
        (click)="cerrar.emit()"
        class="p-2 rounded-lg text-slate-400 hover:text-white hover:bg-slate-700 transition"
      >
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <form [formGroup]="formProyecto" (ngSubmit)="actualizarProyecto()" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-2">Id del proyecto</label>
        <div class="input-field bg-slate-800 text-slate-400 cursor-not-allowed flex items-center">
          {{ formProyecto.get('idProyecto')?.value }}
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Nombre del supervisor</label>
          <input type="text" class="input-field" formControlName="nombreSupervisor" placeholder="Nombre del supervisor" />
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Nombre del proyecto</label>
          <input type="text" class="input-field" formControlName="nombreProyecto" placeholder="Nombre del proyecto" />
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Departamento</label>
          <select class="input-field" formControlName="departamento" (change)="onDepartamentoChange()">
            <option value="">Seleccione un departamento</option>
            <option *ngFor="let departamento of departamentos" [value]="departamento.nombre">
              {{ departamento.nombre }}
            </option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Municipio</label>
          <select class="input-field" formControlName="municipio">
            <option value="">Seleccione un municipio</option>
            <option *ngFor="let municipio of municipiosDisponibles" [value]="municipio">
              {{ municipio }}
            </option>
          </select>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-300 mb-2">Descripción del proyecto</label>
        <textarea rows="4" class="input-field resize-none" formControlName="descripcionProyecto"></textarea>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Fecha de creación</label>
          <input type="date" class="input-field" formControlName="fechaCreacion" />
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Estado</label>
          <select class="input-field" formControlName="status">
            <option value="">Seleccione</option>
            <option value="Iniciando">Iniciando</option>
            <option value="En curso">En curso</option>
            <option value="Completando">Completando</option>
            <option value="Completado">Completado</option>
            <option value="Nuevo">Nuevo</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Prioridad</label>
          <select class="input-field" formControlName="priority">
            <option value="">Seleccione</option>
            <option value="Alta">Alta</option>
            <option value="Media">Media</option>
            <option value="Baja">Baja</option>
          </select>
        </div>
      </div>

      <div class="flex flex-col sm:flex-row gap-3 pt-3">
        <button type="button" class="btn-secondary flex-1" (click)="cerrar.emit()">Cancelar</button>
        <button type="submit" class="btn-primary flex-1">Actualizar</button>
      </div>
    </form>
  </div>
</div>
