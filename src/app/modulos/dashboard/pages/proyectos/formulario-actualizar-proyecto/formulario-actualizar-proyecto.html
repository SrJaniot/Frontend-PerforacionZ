<div
  *ngIf="showModal"
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-3 sm:p-4"
  (click)="cerrar.emit()"
>
  <div
    class="card w-full max-w-2xl max-h-[90vh] overflow-y-auto p-6 animate-slide-up shadow-2xl"
    (click)="$event.stopPropagation()"
  >
    <div class="flex items-center justify-between mb-6">
      <h3 class="text-xl font-bold text-white font-display">Actualizar Proyecto</h3>
      <button
        type="button"
        (click)="cerrar.emit()"
        class="p-2 rounded-lg text-slate-400 hover:text-white hover:bg-slate-700 transition"
      >
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <form [formGroup]="formProyecto" (ngSubmit)="actualizarProyecto()" class="space-y-5">
      <div *ngIf="bloqueado" class="rounded-xl border border-amber-500/30 bg-amber-500/10 p-4 text-sm text-amber-100">
        Este proyecto ya está finalizado. No se permiten más modificaciones.
      </div>

      <div *ngIf="cargandoCatalogos" class="rounded-xl border border-slate-700 bg-slate-900/60 p-4 text-sm text-slate-300">
        Cargando información del proyecto...
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-300 mb-2">Id del proyecto</label>
        <div class="input-field bg-slate-800 text-slate-400 cursor-not-allowed flex items-center">
          {{ formProyecto.get('idProyecto')?.value }}
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Nombre del supervisor</label>
          <input type="text" class="input-field bg-slate-800 text-slate-400 cursor-not-allowed" formControlName="nombreSupervisor" placeholder="Nombre del supervisor" [disabled]="true" />
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Nombre del proyecto</label>
          <input type="text" class="input-field" formControlName="nombreProyecto" placeholder="Nombre del proyecto" [disabled]="bloqueado || guardandoCambios || cargandoCatalogos" />
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Departamento</label>
          <select class="input-field bg-slate-800 text-slate-400 cursor-not-allowed" formControlName="idDepartamento" [disabled]="true">
            <option value="">Seleccione un departamento</option>
            <option *ngFor="let departamento of departamentos" [value]="departamento.ID_DPTO">
              {{ departamento.NOM_DPTO }}
            </option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Municipio</label>
          <select class="input-field bg-slate-800 text-slate-400 cursor-not-allowed" formControlName="idMunicipio" [disabled]="true">
            <option value="">Seleccione un municipio</option>
            <option *ngFor="let municipio of municipiosDisponibles" [value]="municipio.ID_MUNICIPIO">
              {{ municipio.NOM_MUNICIPIO }}
            </option>
          </select>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-300 mb-2">Descripción del proyecto</label>
        <textarea rows="4" class="input-field resize-none" formControlName="descripcionProyecto" [disabled]="bloqueado || guardandoCambios || cargandoCatalogos"></textarea>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Fecha de creación</label>
          <input type="date" class="input-field bg-slate-800 text-slate-400 cursor-not-allowed" formControlName="fechaCreacion" [disabled]="true" />
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Estado</label>
          <select class="input-field" formControlName="status" [disabled]="bloqueado || guardandoCambios || cargandoCatalogos">
            <option value="">Seleccione</option>
            <option *ngFor="let estado of estadosProyecto" [value]="estado.value">
              {{ estado.label }}
            </option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Prioridad</label>
          <select class="input-field" formControlName="priority" [disabled]="bloqueado || guardandoCambios || cargandoCatalogos">
            <option value="">Seleccione</option>
            <option value="Baja">Baja</option>
            <option value="Media">Media</option>
            <option value="Alta">Alta</option>
          </select>
        </div>
      </div>

      <div class="flex flex-col sm:flex-row gap-3 pt-3">
        <button type="button" class="btn-secondary flex-1" (click)="cerrar.emit()" [disabled]="guardandoCambios">Cancelar</button>
        <button type="submit" class="btn-primary flex-1" [disabled]="bloqueado || guardandoCambios || cargandoCatalogos">
          {{ guardandoCambios ? 'Actualizando...' : 'Actualizar' }}
        </button>
      </div>
    </form>
  </div>
</div>
