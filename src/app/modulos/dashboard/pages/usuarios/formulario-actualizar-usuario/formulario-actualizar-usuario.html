<div
  *ngIf="showModal"
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-3 sm:p-4"
  (click)="cerrar.emit()"
>

  <div
    class="card w-full max-w-xl max-h-[90vh] overflow-y-auto p-6 animate-slide-up shadow-2xl"
    (click)="$event.stopPropagation()"
  >

    <!-- Encabezado -->
    <div class="flex items-center justify-between mb-6">

      <h3 class="text-xl font-bold text-white font-display">
        Editar Supervisor
      </h3>

      <button
        type="button"
        (click)="cerrar.emit()"
        class="p-2 rounded-lg text-slate-400 hover:text-white hover:bg-slate-700 transition"
      >
        <svg
          class="w-5 h-5"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      </button>

    </div>

    <form
      [formGroup]="formSupervisor"
      (ngSubmit)="actualizarSupervisor()"
      class="space-y-5"
    >

      <!-- Documento -->
      <div>

        <label class="block text-sm font-medium text-slate-300 mb-2">
          Documento
        </label>

        <div
          class="input-field bg-slate-800 text-slate-400 cursor-not-allowed flex items-center"
        >
          {{ idSupervisor }}
        </div>

      </div>

      <!-- Nombre -->
      <div>

        <label class="block text-sm font-medium text-slate-300 mb-2">
          Nombre completo
        </label>

        <input
          type="text"
          class="input-field"
          formControlName="nom_supervisor"
          placeholder="Ingrese el nombre completo"
        >

      </div>

      <!-- Correo -->
      <div>

        <label class="block text-sm font-medium text-slate-300 mb-2">
          Correo electrónico
        </label>

        <input
          type="email"
          class="input-field"
          formControlName="correo_supervisor"
          placeholder="correo@empresa.com"
        >

      </div>

      <!-- Celular -->
      <div>

        <label class="block text-sm font-medium text-slate-300 mb-2">
          Número celular
        </label>

        <input
          type="text"
          class="input-field"
          formControlName="num_cel_supervisor"
          placeholder="3001234567"
        >

      </div>

      <!-- Estado -->
      <div>

        <label class="block text-sm font-medium text-slate-300 mb-2">
          Estado
        </label>

        <div
          class="flex items-center justify-between rounded-xl border border-slate-700 bg-slate-800 px-4 py-3"
        >

          <div>

            <p class="font-medium text-white">
              {{ formSupervisor.get('activo')?.value ? 'Activo' : 'Inactivo' }}
            </p>

            <p class="text-xs text-slate-400">
              Permitir acceso al sistema
            </p>

          </div>

          <label class="relative inline-flex items-center cursor-pointer">

            <input
              type="checkbox"
              class="sr-only peer"
              formControlName="activo"
            >

            <div
              class="relative w-12 h-6 bg-slate-600 rounded-full transition-colors
                     peer-checked:bg-blue-600
                     after:content-['']
                     after:absolute
                     after:top-[2px]
                     after:left-[2px]
                     after:h-5
                     after:w-5
                     after:bg-white
                     after:rounded-full
                     after:transition-all
                     peer-checked:after:translate-x-6">
            </div>

          </label>

        </div>

      </div>

      <!-- Rol -->
      <div>

        <label class="block text-sm font-medium text-slate-300 mb-2">
          Rol
        </label>

        <div
          class="input-field bg-slate-800 text-slate-400 cursor-not-allowed flex items-center justify-between"
        >

          <span class="font-medium">
            {{ formSupervisor.get('rol')?.value }}
          </span>

          <span
            class="px-3 py-1 rounded-full bg-blue-600/20 text-blue-400 text-xs font-semibold border border-blue-500/30"
          >
            Fijo
          </span>

        </div>

      </div>

      <!-- Botones -->
      <div class="flex flex-col sm:flex-row gap-3 pt-3">

        <button
          type="button"
          class="btn-secondary flex-1"
          (click)="cerrar.emit()"
        >
          Cancelar
        </button>

        <button
          type="submit"
          class="btn-primary flex-1"
        >
          Actualizar
        </button>

      </div>

    </form>

  </div>

</div>
