    <!-- Divider -->
    <div class="w-px h-6 bg-slate-700"></div>

    <!-- User -->
    <div class="relative">
      <button (click)="showProfile = !showProfile; showNotifications = false"
        class="flex items-center gap-2.5 pl-2 pr-3 py-1.5 rounded-xl hover:bg-slate-700 transition-all duration-200">
        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-500 to-cyan-500 flex items-center justify-center text-white text-sm font-bold">
          {{ PrimerasLetrasNombre }}
        </div>
        <div class="hidden md:block text-left">
          <p class="text-sm font-medium text-slate-200 leading-none">{{ nombreUsuario }}</p>
          <p class="text-xs text-slate-500 mt-0.5">{{ roleUsuario }}</p>
        </div>
        <svg class="w-4 h-4 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
        </svg>
      </button>

      <!-- Dropdown profile -->
      <div *ngIf="showProfile"
        class="absolute right-0 mt-2 w-56 bg-slate-800 border border-slate-700 rounded-2xl shadow-2xl shadow-black/50 overflow-hidden animate-slide-up">
        <div class="px-4 py-3 border-b border-slate-700">
          <p class="font-medium text-white text-sm">{{ nombreUsuario }}</p>
          <p class="text-xs text-slate-500">{{ correoUsuario }}</p>
        </div>
