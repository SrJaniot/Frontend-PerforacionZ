<!-- Overlay mobile -->
<div
  *ngIf="isOpen"
  class="fixed inset-0 bg-black/50 z-20 lg:hidden"
  (click)="toggleSidebar.emit()">
</div>

<!-- Sidebar -->
<aside
  class="fixed lg:static z-30 h-full bg-slate-900 border-r border-slate-800 flex flex-col transition-all duration-300 shrink-0"
  [class.w-64]="isOpen"
  [class.w-0]="!isOpen"
  [class.overflow-hidden]="!isOpen"
  [class.lg:w-64]="isOpen"
  [class.lg:w-16]="!isOpen">

  <div class="flex flex-col h-full min-w-[256px] lg:min-w-0" [class.lg:min-w-[64px]]="!isOpen">

    <!-- Logo -->
    <div class="flex items-center gap-3 px-4 py-5 border-b border-slate-800">

      <!-- Logo PNG -->
      <div class="w-9 h-9 rounded-xl bg-orange-600 flex items-center justify-center shrink-0 shadow-lg shadow-blue-500/30 overflow-hidden">
        <img src="/img/PZSinFondoBlanco.png" alt="Perforación Z" class="w-full h-full object-contain" />
      </div>

      <div *ngIf="isOpen" class="overflow-hidden">
        <h1 class="text-lg font-bold text-white font-display leading-none">
          PerforaciónZ
        </h1>
        <p class="text-slate-500 text-xs mt-0.5">
          Gestión de Perforación
        </p>
      </div>

    </div>

    <!-- Nav -->
    <nav class="flex-1 px-3 py-4 overflow-y-auto space-y-6">
      <div *ngFor="let group of navGroups">
        <p *ngIf="isOpen" class="text-slate-500 text-xs font-semibold uppercase tracking-widest px-3 mb-2">
          {{ group.title }}
        </p>
        <div class="space-y-1">
          <a
            *ngFor="let item of group.items"
            [routerLink]="item.route"
            routerLinkActive="active"
            class="sidebar-link relative"
            [title]="!isOpen ? item.label : ''">

            <!-- Icon -->
            <span class="shrink-0">
              <!-- Home -->
              <svg *ngIf="item.icon==='home'" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
              </svg>
              <!-- Users -->
              <svg *ngIf="item.icon==='users'" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
              </svg>
              <!-- Briefcase -->
              <svg *ngIf="item.icon==='briefcase'" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
              </svg>
              <!-- Package -->
              <svg *ngIf="item.icon==='package'" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
              </svg>
              <!-- Bar chart -->
              <svg *ngIf="item.icon==='bar-chart'" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
              </svg>




              <!-- aca pon tus iconos perzonalisados-----------------------------------  -->

              <!-- Admin -->
              <svg *ngIf="item.icon==='admin'" class="w-5 h-5"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                  stroke-width="2">
                <path stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M12 3l7 4v5c0 5-3.5 8-7 9-3.5-1-7-4-7-9V7l7-4z" />
              </svg>
              <!-- Brocas -->
              <svg *ngIf="item.icon==='drill'" class="w-5 h-5"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                  stroke-width="2">
                <path stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M11 2h2v6l3-2 1.5 1.5L13 12v10h-2V12L6.5 7.5 8 6l3 2V2z"/>
              </svg>


              <!-- Proyectos -->
              <svg *ngIf="item.icon==='folder'" class="w-5 h-5"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                  stroke-width="2">
                <path stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/>
              </svg>

              <!-- Supervisores -->
              <svg *ngIf="item.icon==='supervisor'" class="w-5 h-5"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                  stroke-width="2">
                <path stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M12 12a4 4 0 100-8 4 4 0 000 8zm0 2c-4 0-7 2-7 5v1h14v-1c0-3-3-5-7-5z"/>
                <path stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M18 6l1 1 2-2"/>
              </svg>

            </span>

            <span *ngIf="isOpen" class="flex-1 truncate">{{ item.label }}</span>

            <!-- Badge -->
            <span *ngIf="isOpen && item.badge"
              class="ml-auto text-xs font-bold px-1.5 py-0.5 rounded-md min-w-[20px] text-center"
              [class.bg-blue-900/60]="item.badgeType==='info'"
              [class.text-blue-400]="item.badgeType==='info'"
              [class.bg-amber-900/60]="item.badgeType==='warning'"
              [class.text-amber-400]="item.badgeType==='warning'"
              [class.bg-red-900/60]="item.badgeType==='danger'"
              [class.text-red-400]="item.badgeType==='danger'">
              {{ item.badge }}
            </span>
          </a>
        </div>
      </div>
    </nav>

    <!-- User profile bottom -->
    <div class="px-3 py-4 border-t border-slate-800">
      <div class="flex items-center gap-3 px-2">
        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-500 to-cyan-500 flex items-center justify-center text-white text-sm font-bold shrink-0">
          {{ PrimerasLetrasNombre }}
        </div>
        <div *ngIf="isOpen" class="flex-1 min-w-0">
          <p class="text-sm font-medium text-slate-200 truncate">{{ nombreUsuario }}</p>
          <p class="text-xs text-slate-500 truncate">{{ roleUsuario }}</p>
        </div>
        <button *ngIf="isOpen" class="text-slate-500 hover:text-red-400 transition-colors" title="Cerrar sesión" (click)="cerrarSesion()">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
        </button>
      </div>
    </div>

  </div>
</aside>
