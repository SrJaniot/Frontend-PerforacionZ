<div class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-800 flex items-center justify-center px-4">

  <!-- Glow de fondo -->
  <div class="absolute inset-0 overflow-hidden">
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-orange-500/10 blur-3xl rounded-full"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-cyan-500/10 blur-3xl rounded-full"></div>
  </div>

  <div class="relative w-full max-w-6xl">

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 items-center">

      <!-- LADO IZQUIERDO -->
      <div class="hidden lg:flex flex-col items-center justify-center">

        <div class="relative">

          <!-- Glow -->
          <div
            class="absolute inset-0 bg-orange-500/20 blur-3xl rounded-full scale-125">
          </div>

          <!-- Orbe -->
          <div
            class="relative w-80 h-80 rounded-full border border-orange-500/20 bg-slate-900/60 backdrop-blur-xl flex items-center justify-center animate-float">

            <img
              src="img/PZSinFondoBlanco.png"
              alt="PerforaciónZ"
              class="w-[70%] h-[70%] object-contain drop-shadow-2xl">

          </div>

        </div>

        <h1 class="mt-8 text-4xl font-black text-white">
          Perforación<span class="text-orange-500">Z</span>
        </h1>

        <p class="mt-4 text-slate-400 text-center max-w-md">
          Gestión inteligente de perforaciones, brocas y movimientos
          operativos en tiempo real.
        </p>

      </div>

      <!-- FORMULARIO -->
      <div class="flex justify-center">

        <div
          class="w-full max-w-md bg-slate-900/70 backdrop-blur-xl border border-slate-700 rounded-3xl p-8 shadow-2xl">

          <!-- Logo móvil -->
          <div class="lg:hidden flex justify-center mb-6">

            <div
              class="w-32 h-32 rounded-full border border-orange-500/20 bg-slate-800 flex items-center justify-center">

              <img
                src="img/PZSinFondoBlanco.png"
                alt="PerforaciónZ"
                class="w-[75%] h-[75%] object-contain">

            </div>

          </div>

          <div class="text-center lg:text-left">

            <h2 class="text-3xl font-bold text-white">
              Iniciar Sesión
            </h2>

            <p class="mt-2 text-slate-400">
              Accede a tu cuenta para continuar.
            </p>

          </div>

          <form  [formGroup]="formularioLogin"  class="mt-8 space-y-5">

            <div>
              <label class="block text-sm text-slate-300 mb-2">
                Correo electrónico
              </label>

              <input  formControlName="usuario"
                type="email"
                placeholder="correo@empresa.com"
                class="w-full px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 text-white focus:border-orange-500 focus:outline-none transition">
                <div class="show-errors" *ngIf="obtenerFormGroup['usuario'].errors && (obtenerFormGroup['usuario'].dirty || obtenerFormGroup['usuario'].touched)" >
                          <strong>Este campo es obligatorio</strong>
                        </div>
            </div>

            <div>
              <label class="block text-sm text-slate-300 mb-2">
                Contraseña
              </label>

              <input  formControlName="clave"
                type="password"
                placeholder="••••••••"
                class="w-full px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 text-white focus:border-orange-500 focus:outline-none transition">
                <div class="show-errors" *ngIf="obtenerFormGroup['clave'].errors && (obtenerFormGroup['clave'].dirty || obtenerFormGroup['clave'].touched)" >
                          <strong>Este campo es obligatorio</strong>
                        </div>
            </div>

            <div class="flex justify-between items-center">



              <a  (click)="alertaOlvidoContrasena()"
                class="text-orange-400 hover:text-orange-300 text-sm">
                ¿Olvidaste tu contraseña?
              </a>

            </div>

            <button (click)="EnviarLogin()"
              type="submit"
              class="w-full py-3 rounded-xl bg-orange-500 hover:bg-orange-600 text-white font-semibold transition shadow-lg shadow-orange-500/30">

              Ingresar

            </button>

          </form>

        </div>

      </div>

    </div>

  </div>

</div>
